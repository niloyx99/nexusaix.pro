# Render Blueprint — Backend API only
# Frontend: Hostinger (nexusaix.pro) | Admin: Vercel
# Repo rootDir = backend

services:
  - type: web
    name: nexus-ai-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: MONGODB_DB_NAME
        value: aldi_bot
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash-lite
      - key: QUOTEX_MARKET_API_URL
        value: https://quotex-data-1n2b.onrender.com
      - key: FRONTEND_URL
        value: https://nexusaix.pro,https://www.nexusaix.pro
      - key: CORS_ORIGINS
        value: https://nexusaix.pro,https://www.nexusaix.pro
      - key: API_PREFIX
        value: /nx-svc-k8m4t7q2w9p3
      - key: ADMIN_PATH
        value: /nx-ctrl-p3m9k7x2w8q5
      - key: MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false
