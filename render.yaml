# Render Blueprint — Backend API only
# Frontend: Hostinger | Admin: Vercel

services:
  - type: web
    name: nexus-ai-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: MONGODB_DB_NAME
        value: aldi_bot
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash-lite
      - key: QUOTEX_MARKET_API_URL
        value: https://quotex-data-1n2b.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
