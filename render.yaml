# Render Blueprint — API only (frontend & admin hosted separately)
# Repo: https://github.com/niloyx99/nexus-ai-

services:
  - type: web
    name: nexus-ai-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_DB_NAME
        value: aldi_bot
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash
      - key: QUOTEX_MARKET_API_URL
        value: https://quotex-data-1n2b.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false
